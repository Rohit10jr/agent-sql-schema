<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>{% block title %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#111;">
	<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f4f5f7;padding:24px 0;">
		<tr>
			<td align="center">
				<table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-radius:8px;border:1px solid #e6e7eb;max-width:560px;">
					<tr>
						<td style="padding:32px;">
							{# Swap the src below for your hosted logo URL (must be a public absolute URL — email clients can't render relative paths or data URIs reliably). #}
							<div style="margin:0 0 24px;">
								<img src="https://placehold.co/120x32/111111/ffffff?text={{ site_name|urlencode }}" alt="{{ site_name }}" width="120" height="32" style="display:block;border:0;outline:none;text-decoration:none;border-radius:4px;">
							</div>
							{% block content %}{% endblock %}
						</td>
					</tr>
				</table>
				<p style="margin:16px 0 0;font-size:11px;color:#888;">© {{ site_name }}</p>
			</td>
		</tr>
	</table>
</body>
</html>
